services:
  server:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - server/.env
    depends_on:
      - mongo
    environment:
      - MONGO_TLS=false
      - MONGO_URI=mongodb://mongo:27017/Albums
    restart: unless-stopped
    
  ai-service:
    build: ./ai-service
    container_name: photo-album-ai
    ports:
      - "8000:8000"
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
